<script>
let userFavorites = new Set();
let currentGameId = null;
let currentPlat = 'all';
let currentYear = 'all';
let currentGenre = 'all';
let currentView = 'wall';
let keyword = '';
let games = [];
let dailyRecommend = [];
let allYears = [];

// 视图元素
const wallView = document.getElementById('wallView');
const gridView = document.getElementById('gridView');
const favoritesView = document.getElementById('favoritesView');
const grid = document.getElementById('grid');

function loadUserFavorites() {
  try {
    const favorites = localStorage.getItem('favorites');
    if (favorites) {
      userFavorites = new Set(JSON.parse(favorites));
      updateFavoriteButton();
    }
  } catch (err) {
    console.error('加载收藏失败', err);
    userFavorites = new Set();
  }
}

function saveUserFavorites() {
  try {
    localStorage.setItem('favorites', JSON.stringify(Array.from(userFavorites)));
    // 重新渲染收藏页面
    if (currentView === 'favorites') {
      renderFavorites();
    }
  } catch (err) {
    console.error('保存收藏失败', err);
  }
}

function toggleFavorite() {
  if (!currentGameId) return;

  if (userFavorites.has(currentGameId)) {
    userFavorites.delete(currentGameId);
  } else {
    userFavorites.add(currentGameId);
  }

  updateFavoriteButton();
  saveUserFavorites();
}

function updateFavoriteButton() {
  const btn = document.getElementById('favoriteBtn');
  const icon = document.getElementById('favIcon');
  const text = document.getElementById('favText');

  if (currentGameId && userFavorites.has(currentGameId)) {
    btn.classList.add('active');
    icon.textContent = '♥';
    text.textContent = '已收藏';
  } else {
    btn.classList.remove('active');
    icon.textContent = '♡';
    text.textContent = '收藏';
  }
}

function scrollFilterBar(arrow, direction) {
  const filterBar = arrow.closest('.filter-bar');
  const filterContent = filterBar.querySelector('.filter-content');
  const scrollAmount = direction === 'left' ? -300 : 300;
  
  if (filterContent) {
    filterContent.scrollBy({ left: scrollAmount, behavior: 'smooth' });
  }
  
  // 检查是否滚动到最前面，隐藏/显示左侧箭头
  updateArrowVisibility(filterBar);
}

function updateArrowVisibility(filterBar) {
  const content = filterBar.querySelector('.filter-content');
  const leftArrow = filterBar.querySelector('.filter-arrow.left');
  
  if (leftArrow && content) {
    // 当滚动位置为0时，隐藏左侧箭头
    if (content.scrollLeft === 0) {
      leftArrow.style.display = 'none';
    } else {
      leftArrow.style.display = 'flex';
    }
  }
}

// 为所有筛选栏添加滚动事件监听器
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.filter-bar').forEach(bar => {
    const content = bar.querySelector('.filter-items') || bar.querySelector('.filter-content');
    if (content) {
      content.addEventListener('scroll', function() {
        updateArrowVisibility(bar);
      });
      // 初始检查箭头可见性
      updateArrowVisibility(bar);
    }
  });
});

// 页面加载时加载收藏数据
loadUserFavorites();

const platformBackground = {
  all:    "https://picsum.photos/id/111/1920/1080",
  FC:     "https://picsum.photos/id/237/1920/1080",
  SFC:    "https://picsum.photos/id/20/1920/1080",
  N64:    "https://picsum.photos/id/160/1920/1080",
  NGC:    "https://picsum.photos/id/180/1920/1080",

function getRandomGames(list, count) {
  if (!Array.isArray(list)) {
    console.warn('getRandomGames: list 不是数组，返回空数组');
    return [];
  }
  const shuffled = [...list];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, count);
}

function generateYearFilters() {
  // 提取所有唯一的年份
  const yearSet = new Set();
  if (Array.isArray(games)) {
    games.forEach(game => {
      if (game.year && game.year.length === 4 && !isNaN(game.year)) {
        yearSet.add(game.year);
      }
    });
  }
  
  // 按年份排序
  allYears = Array.from(yearSet).sort((a, b) => parseInt(b) - parseInt(a));
  
  // 生成年份筛选按钮
  const yearFilterItems = document.getElementById('yearFilterItems');
  if (yearFilterItems) {
    yearFilterItems.innerHTML = '';
    
    // 添加年份按钮
    allYears.forEach(year => {
      const yearButton = document.createElement('div');
      yearButton.className = 'year-tab';
      yearButton.dataset.year = year;
      yearButton.textContent = year;
      yearFilterItems.appendChild(yearButton);
    });
    
    // 添加年份筛选事件处理
    document.querySelectorAll('.year-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentYear = tab.dataset.year;
        refresh();
      };
    });
  }
}

async function loadGames() {
  try {
    const timestamp = new Date().getTime();
    const res = await fetch(`./games.json?timestamp=${timestamp}`);
    if (!res.ok) throw new Error(`加载失败：${res.status}`);
    const data = await res.json();
    if (typeof data !== 'object' || data === null) {
      throw new Error('数据格式错误：不是有效的对象');
    }
    games = Array.isArray(data.games) ? data.games : [];
    dailyRecommend = getRandomGames(games, 10);
    
    // 生成年份筛选按钮
    generateYearFilters();
    
    refresh();
  } catch (err) {
    console.error('加载游戏数据失败', err);
    const recommendList = document.getElementById('recommendList');
    if (recommendList) {
      recommendList.innerHTML = `<div style="color:#fff;padding:20px;text-align:center;">数据加载失败：${err.message}</div>`;
    }
  }
}


const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', e=>{

});

function openInfo(g){
  currentGameId = g.platform + '_' + g.cn;
  document.getElementById('infoCn').textContent = g.cn;
  document.getElementById('infoEn').textContent = g.en;
  document.getElementById('infoYear').textContent = g.year;
  document.getElementById('infoPlat').textContent = g.platform;
  document.getElementById('infoDev').textContent = g.developer || '暂无信息';
  document.getElementById('infoPub').textContent = g.publisher || '暂无信息';
  document.getElementById('infoGenre').textContent = g.genre || '暂无信息';
  document.getElementById('infoRate').textContent = g.rating || '暂无信息';
  document.getElementById('infoSeries').textContent = g.series || '暂无信息';
  document.getElementById('infoNote').textContent = g.note || '暂无信息';
  document.getElementById('infoDesc').textContent = g.desc || '暂无简介';

  const linkEl = document.getElementById('infoLink');
  if (g.resource) {
    const urlMatch = g.resource.match(/https?:\/\/[^\s]+/);
    if (urlMatch) {
      linkEl.href = urlMatch[0];
      linkEl.textContent = '点击下载';
    } else {
      linkEl.href = '#';
      linkEl.textContent = g.resource;
    }
  } else {
    linkEl.href = '#';
    linkEl.textContent = '暂无资源';
  }

  const videoEl = document.getElementById('videoPlayer');
  if (g.video) {
    let videoSrc = g.video;
    if (videoSrc.includes('bilibili.com/video/')) {
      const bvidMatch = videoSrc.match(/BV\w+/);
      if (bvidMatch) {
        videoSrc = `https://player.bilibili.com/player.html?bvid=${bvidMatch[0]}&high_quality=1`;
      }
    }
    if (videoSrc.startsWith('http')) {
      videoEl.innerHTML = `<iframe src="${videoSrc}" allowfullscreen></iframe>`;
    } else {
      videoEl.innerHTML = `<div style="padding:20px;text-align:center;color:#888;">${g.video}</div>`;
    }
  } else {
    videoEl.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">暂无视频</div>';
  }

  const audioEl = document.getElementById('audioPlayer');
  if (g.audio && g.audio.startsWith('http')) {
    audioEl.innerHTML = `<audio controls src="${g.audio}">`;
  } else {
    audioEl.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">暂无音乐</div>';
  }

  document.getElementById('infoPanel').classList.add('show');
  updateFavoriteButton();
  document.getElementById('infoOverlay').classList.add('show');
}
function closeInfo(){
  document.getElementById('infoPanel').classList.remove('show');
  document.getElementById('infoOverlay').classList.remove('show');
}

let startX = 0;
const panel = document.getElementById('infoPanel');
panel.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; });
panel.addEventListener('touchmove', e=>{
  const dx = e.touches[0].clientX - startX;
  if(dx > 50) closeInfo();
});

function getFilteredGames(){  if (!Array.isArray(games)) {    return [];  }  return games.filter(g=>{    const matchPlatform = (currentPlat === 'all' || g.platform === currentPlat);    const matchKeyword = !keyword ||      g.cn.toLowerCase().includes(keyword) ||      g.en.toLowerCase().includes(keyword);    const matchYear = (currentYear === 'all' || g.year === currentYear);    const matchGenre = (currentGenre === 'all' ||       (g.genre && g.genre.split(',').some(genre =>         genre.trim() === currentGenre      )));    return matchPlatform && matchKeyword && matchYear && matchGenre;  });}

function refresh(){  if (!games || games.length === 0) return;  const color = platformColor[currentPlat] || '#ff4422';  document.body.style.setProperty('--accent', color);

  wallView.style.display = currentView==='wall'?'block':'none';  gridView.style.display = currentView==='grid'?'block':'none';  favoritesView.style.display = currentView==='favorites'?'block':'none';

  // 根据当前视图显示或隐藏搜索框和筛选栏
  const searchBar = document.getElementById('searchBar');
  const platformFilter = document.getElementById('platformFilter');
  const genreFilter = document.getElementById('genreFilter');
  const yearFilter = document.getElementById('yearFilter');
  
  if (currentView === 'grid') {
    searchBar.style.display = 'block';
    platformFilter.style.display = 'flex';
    genreFilter.style.display = 'flex';
    yearFilter.style.display = 'flex';
  } else {
    searchBar.style.display = 'none';
    platformFilter.style.display = 'none';
    genreFilter.style.display = 'none';
    yearFilter.style.display = 'none';
  }

  const list = getFilteredGames();  
  
  // 更新游戏数量显示
  const gameCountElement = document.getElementById('gameCount');
  if (gameCountElement) {
    let count = 0;
    if (currentView === 'favorites') {
      count = userFavorites.size;
    } else {
      count = list.length;
    }
    gameCountElement.textContent = `游戏数量: ${count}`;
  }
  
  if(currentView==='wall') renderWall(list);  if(currentView==='grid') renderGrid(list);  if(currentView==='favorites') renderFavorites();}

function renderWall(list){
  const recommendList = document.getElementById('recommendList');
  recommendList.innerHTML='';
  if(dailyRecommend.length === 0){
    recommendList.innerHTML = '<div style="color:#fff;padding:20px;text-align:center;">暂无推荐游戏</div>';
  } else {
    dailyRecommend.forEach(g=>{
      const card=document.createElement('div');
      card.className='recommend-card';
      card.innerHTML=`
        <img class="recommend-cover" src="${g.cover || 'https://picsum.photos/id/23/160/240'}" onerror="this.src='https://picsum.photos/id/23/160/240'">
        <div class="recommend-detail">
          <div class="recommend-name">${g.cn}</div>
          <div class="recommend-meta">
            <span>${g.year}</span>
            <span>${g.platform}</span>
            <span>${g.genre || '暂无类型'}</span>
            <span>⭐ ${g.rating || '暂无评分'}</span>
            <span>开发商：${g.developer || '暂无'}</span>
            <span>发行商：${g.publisher || '暂无'}</span>
            ${g.series ? `<span>系列：${g.series}</span>` : ''}
          </div>
          <div class="recommend-desc">${g.desc || '暂无简介'}</div>
        </div>
      `;
      card.onclick=()=>openInfo(g);
      recommendList.appendChild(card);
    });
  }
}



function renderGrid(list){  grid.innerHTML='';  if(list.length === 0){    grid.innerHTML = '<div style="color:#fff;padding:20px;">暂无匹配的游戏</div>';    return;  }  list.forEach(g=>{    const card=document.createElement('div');    card.className='grid-card';    card.innerHTML=`      <img class="grid-cover" src="${g.cover || 'https://picsum.photos/id/23/160/240'}" onerror="this.src='https://picsum.photos/id/23/160/240'">      <div class="grid-info">        <div class="grid-name-cn">${g.cn}</div>      </div>`;    card.onclick=()=>openInfo(g);    grid.appendChild(card);  });}function randomizeRecommend() {
  dailyRecommend = getRandomGames(games, 10);
  renderWall(getFilteredGames());
}

function renderFavorites(){  const favoritesGrid = document.getElementById('favoritesGrid');  const favoritesEmpty = document.getElementById('favoritesEmpty');  favoritesGrid.innerHTML='';  if(userFavorites.size === 0){    favoritesEmpty.style.display = 'block';    favoritesEmpty.textContent = '还没有收藏任何游戏';    favoritesGrid.style.display = 'none';  } else {    favoritesEmpty.style.display = 'none';    favoritesGrid.style.display = 'grid';    const favoriteGames = Array.isArray(games) ? games.filter(g => {      const gameId = g.platform + '_' + g.cn;      return userFavorites.has(gameId);    }) : [];    favoriteGames.forEach(g=>{      const card=document.createElement('div');      card.className='grid-card';      card.innerHTML=`
        <img class="grid-cover" src="${g.cover || 'https://picsum.photos/id/22/100/140'}" onerror="this.src='https://picsum.photos/id/22/100/140'">
        <div class="grid-info">
          <div class="grid-name-cn">${g.cn}</div>
          <span class="grid-platform" style="background:${platformColor[g.platform]}">${g.platform}</span>
        </div>
      `;      card.onclick=()=>openInfo(g);      favoritesGrid.appendChild(card);    });  }}updatePlatformBackground();loadGames();
