<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的游戏库</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family:system-ui,-apple-system,sans-serif;
    background:#111;
    color:#fff;
    overflow:hidden;
  }

  /* 背景大图 */
  .background {
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background-size:cover;
    background-position:center;
    filter:brightness(0.4);
    z-index:-1;
    transition:background-image 0.5s ease;
  }

  /* 左侧信息面板 */
  .info-panel {
    position:absolute;
    top:15%;left:5%;
    max-width:40%;
  }
  .game-title {
    font-size:3rem;
    font-weight:800;
    text-transform:uppercase;
    color:#ff4422;
    margin-bottom:1rem;
  }
  .game-meta {
    font-size:1rem;
    color:#ccc;
    line-height:1.6;
  }

  /* 底部游戏墙 */
  .game-wall {
    position:absolute;
    bottom:5%;left:0;right:0;
    display:flex;
    gap:12px;
    padding:0 5%;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .game-wall::-webkit-scrollbar {display:none;}
  .game-cover {
    width:120px;
    height:160px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:transform 0.2s,box-shadow 0.2s;
    border:2px solid transparent;
  }
  .game-cover:hover, .game-cover.active {
    transform:scale(1.1);
    box-shadow:0 0 15px rgba(255,255,255,0.3);
    border-color:#fff;
  }
</style>
</head>
<body>
  <!-- 背景大图 -->
  <div class="background" id="bg"></div>

  <!-- 信息面板 -->
  <div class="info-panel">
    <h1 class="game-title" id="title">TARGET: RENEGADE</h1>
    <div class="game-meta" id="meta">
      <p>Imagine Software • 1988</p>
      <p>平台：任天堂 FC</p>
      <p>类型：清版动作</p>
    </div>
  </div>

  <!-- 底部游戏墙 -->
  <div class="game-wall" id="wall"></div>

<script>
// 1. 读取飞书导出的游戏数据（games.json 放在同一目录）
async function loadGames() {
  const res = await fetch('games.json');
  return await res.json();
}

// 2. 渲染底部游戏墙
function renderWall(games, onSelect) {
  const wall = document.getElementById('wall');
  wall.innerHTML = '';
  games.forEach((g, i) => {
    const img = document.createElement('img');
    img.className = 'game-cover';
    img.src = g.coverUrl; // 飞书里的封面图链接
    img.alt = g.name;
    img.onclick = () => {
      // 移除所有选中状态
      document.querySelectorAll('.game-cover').forEach(el => el.classList.remove('active'));
      img.classList.add('active');
      // 切换背景和信息
      onSelect(g);
    };
    if (i === 0) img.classList.add('active'); // 默认选中第一个
    wall.appendChild(img);
  });
}

// 3. 更新背景和信息面板
function updateDisplay(game) {
  document.getElementById('bg').style.backgroundImage = `url(${game.artUrl})`; // 飞书里的高清艺术图
  document.getElementById('title').textContent = game.name;
  document.getElementById('meta').innerHTML = `
    <p>${game.developer} • ${game.year}</p>
    <p>平台：${game.platform}</p>
    <p>类型：${game.genre}</p>
  `;
}

// 4. 初始化
(async () => {
  const games = await loadGames();
  renderWall(games, updateDisplay);
  if (games.length > 0) updateDisplay(games[0]);
})();
</script>
</body>
</html>
